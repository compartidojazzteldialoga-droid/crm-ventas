<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRICRI CORP — Empleado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container inner">
      <span class="logo">CRICRI CORP</span>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀ Modo claro</button>
        <span class="badge" id="user-badge">—</span>
        <button class="btn btn-outline" style="font-size:0.75rem;padding:6px 14px;" onclick="doLogout()">Salir</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="form-card">
      <h2>Registrar venta</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="campana">Campaña</label>
          <select id="campana" onchange="onCampanaChange()">
            <option value="">— Seleccionar campaña —</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tarifa">Tarifa contratada</label>
          <select id="tarifa">
            <option value="">— Primero seleccioná campaña —</option>
          </select>
        </div>
        <div class="form-group">
          <label for="client-name">Nombre del cliente</label>
          <input type="text" id="client-name" placeholder="Ej: Empresa S.A." />
        </div>
        <div class="form-group">
          <label for="client-dni">DNI del cliente</label>
          <input type="text" id="client-dni" placeholder="Ej: 12345678A" />
        </div>
        <div class="form-group">
          <label for="client-numeros">Números a contratar</label>
          <input type="text" id="client-numeros" placeholder="Ej: 600000001, 600000002" />
        </div>
        <div class="form-group">
          <label for="mes">Mes</label>
          <input type="month" id="mes" />
        </div>
        <div class="form-group">
          <label for="estado">Estado</label>
          <select id="estado">
            <option value="activo">Activo</option>
            <option value="activo_parcial">Activo parcial</option>
            <option value="en_curso">En curso</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
        <div class="form-group">
          <label for="notas">Notas (opcional)</label>
          <input type="text" id="notas" placeholder="Observaciones..." />
        </div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" onclick="submitSale()">Registrar venta</button>
        <span id="form-status" style="font-size:0.82rem;color:var(--text-muted);"></span>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>Mis ventas</h2>
        <select id="filter-mes-emp" style="font-size:0.8rem;padding:6px 10px;"><option value="">Todos los meses</option></select>
      </div>
      <table>
        <thead><tr><th>Cliente</th><th>DNI</th><th>Campaña</th><th>Tarifa</th><th>Mes</th><th>Estado</th><th>Cambiar estado</th><th>Acción</th></tr></thead>
        <tbody id="emp-table-body"><tr><td colspan="8" class="empty">Sin ventas registradas</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
  <script>
    applyTheme();
    requireAuth('employee');
    document.getElementById('mes').value = new Date().toISOString().slice(0, 7);
    const session = getSession();
    if (session) document.getElementById('user-badge').textContent = session.name;
    initEmployee();
  </script>
</body>
</html>
