<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRICRI CORP — Tarifas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container inner">
      <span class="logo">CRICRI CORP</span>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀ Modo claro</button>
        <a href="admin.html" class="btn btn-outline" style="font-size:0.75rem;padding:6px 14px;">← Volver</a>
        <span class="badge adm">ADM</span>
        <button class="btn btn-outline" style="font-size:0.75rem;padding:6px 14px;" onclick="doLogout()">Salir</button>
      </div>
    </div>
  </header>

  <div class="container">

    <div class="form-card">
      <h2>Nueva tarifa</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="new-tarifa-nombre">Nombre</label>
          <input type="text" id="new-tarifa-nombre" placeholder="Ej: Tarifa C" />
        </div>
        <div class="form-group">
          <label for="new-tarifa-monto">Monto (€)</label>
          <input type="number" id="new-tarifa-monto" placeholder="Ej: 200" />
        </div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" onclick="addTarifa()">Agregar tarifa</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header"><h2>Tarifas activas</h2></div>
      <table>
        <thead>
          <tr><th>Nombre</th><th>Monto</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tarifas-table-body">
          <tr><td colspan="3" class="empty">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
  <script>
    applyTheme();
    requireAuth('admin');
    renderTarifasTable();
  </script>
</body>
</html>
