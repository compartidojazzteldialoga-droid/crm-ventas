<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRICRI CORP — Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container inner">
      <span class="logo">CRICRI CORP</span>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀ Modo claro</button>
        <a href="admin.html" class="btn btn-outline" style="font-size:0.75rem;padding:6px 14px;">← Volver</a>
        <span class="badge adm">ADM</span>
        <button class="btn btn-outline" style="font-size:0.75rem;padding:6px 14px;" onclick="doLogout()">Salir</button>
      </div>
    </div>
  </header>

  <div class="container">

    <div class="form-card">
      <h2 id="form-title">Crear usuario</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="new-name">Nombre completo</label>
          <input type="text" id="new-name" placeholder="Ej: Juan García" />
        </div>
        <div class="form-group">
          <label for="new-user">Usuario</label>
          <input type="text" id="new-user" placeholder="Ej: juangarcia" />
        </div>
        <div class="form-group">
          <label for="new-pass">Contraseña</label>
          <input type="password" id="new-pass" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label for="new-role">Rol</label>
          <select id="new-role">
            <option value="employee">Empleado</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" id="save-user-btn" onclick="createUser()">Crear usuario</button>
        <button class="btn btn-outline" id="cancel-edit-btn" onclick="cancelEdit()" style="display:none;">Cancelar</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header"><h2>Usuarios del sistema</h2></div>
      <table>
        <thead>
          <tr><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Acciones</th></tr>
        </thead>
        <tbody id="users-table-body">
          <tr><td colspan="4" class="empty">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
  <script>
    applyTheme();
    requireAuth('admin');
    renderUsersTable();
  </script>
</body>
</html>
