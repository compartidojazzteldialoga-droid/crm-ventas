<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRICRI CORP — Nueva venta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container inner">
      <span class="logo">CRICRI CORP</span>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀ Modo claro</button>
        <a href="admin.html" class="btn btn-outline" style="font-size:0.75rem;padding:6px 14px;">← Volver</a>
        <span class="badge adm">ADM</span>
        <button class="btn btn-outline" style="font-size:0.75rem;padding:6px 14px;" onclick="doLogout()">Salir</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="form-card">
      <h2>Registrar venta</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="campana">Campaña</label>
          <select id="campana" onchange="onCampanaChange()"><option value="">— Seleccionar campaña —</option></select>
        </div>
        <div class="form-group">
          <label for="tarifa">Tarifa</label>
          <select id="tarifa"><option value="">— Primero seleccioná campaña —</option></select>
        </div>
        <div class="form-group">
          <label>Velocidad fibra</label>
          <div style="padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:0.95rem;color:var(--text-muted);" id="velocidad-display">—</div>
        </div>
        <div class="form-group">
          <label for="client-name">Nombre del cliente</label>
          <input type="text" id="client-name" placeholder="Ej: Empresa S.A." />
        </div>
        <div class="form-group">
          <label for="client-dni">DNI del cliente</label>
          <input type="text" id="client-dni" placeholder="Ej: 12345678A" />
        </div>
        <div class="form-group">
          <label for="client-numeros">Números móviles a contratar</label>
          <input type="text" id="client-numeros" placeholder="Ej: 600000001, 600000002" />
        </div>
        <div class="form-group">
          <label for="mes">Mes</label>
          <input type="month" id="mes" />
        </div>
        <div class="form-group">
          <label for="notas">Notas (opcional)</label>
          <input type="text" id="notas" placeholder="Observaciones..." />
        </div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" onclick="submitSale()">Registrar venta</button>
        <span id="form-status" style="font-size:0.82rem;color:var(--text-muted);"></span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
  <script>
    applyTheme();
    requireAuth('admin');
    document.getElementById('mes').value = new Date().toISOString().slice(0, 7);
    populateCampanaSelect();
  </script>
</body>
</html>
